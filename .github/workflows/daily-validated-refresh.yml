name: Daily validated Energy Mix refresh

on:
  schedule:
    # 06:45 UTC is 07:45 in the UK during BST. During GMT this runs at 06:45 UK time,
    # still safely after yesterday's Elexon/NESO settlement data should be available.
    - cron: '45 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: daily-validated-energy-mix-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with external validation gate
        run: npm run build

      - name: Commit generated data if changed
        id: commit
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/sitemap.xml public/data/validation/latest.json src/data/energyMixGenerated.json src/data/staticGridSnapshot.json
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No generated data changes to commit."
            exit 0
          fi
          refresh_date="$(node -e "const fs=require('fs'); const j=JSON.parse(fs.readFileSync('public/data/validation/latest.json','utf8')); process.stdout.write(j.date || new Date().toISOString().slice(0,10));")"
          git commit -m "Refresh Energy Mix daily data ${refresh_date}"
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Push generated data
        if: steps.commit.outputs.changed == 'true'
        run: git push
